services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY:-}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: orgkampus
      DB_USERNAME: orgkampus
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      LOG_CHANNEL: stderr
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage:/app/storage

  db:
    image: mysql:8.4
    ports:
      - "${DB_PORT_FORWARD:-3307}:3306"
    environment:
      MYSQL_DATABASE: orgkampus
      MYSQL_USER: orgkampus
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_RANDOM_ROOT_PASSWORD: "1"
    volumes:
      - mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "orgkampus", "-p${DB_PASSWORD:-secret}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  storage:
  mysql:
