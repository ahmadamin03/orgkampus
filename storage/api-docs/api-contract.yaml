  # ══════════════════════════════════════════
  #  SURATS
  # ══════════════════════════════════════════
  /surats:
    get:
      tags: [Surat]
      summary: Daftar surat
      description: Mengembalikan daftar surat (masuk/keluar).
      operationId: listSurats
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Daftar surat (ter-paginate)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/PaginatedData"
        "401":
          description: Tidak terautentikasi

    post:
      tags: [Surat]
      summary: Tambah surat baru
      description: Menambahkan surat baru. Upload file bersifat opsional.
      operationId: createSurat
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - nomor_surat
                - type
                - perihal
                - pengirim_penerima
                - tanggal
              properties:
                nomor_surat:
                  type: string
                  maxLength: 255
                  example: "SRT/ORG/2026/001"
                type:
                  type: string
                  enum: [Surat Masuk, Surat Keluar]
                perihal:
                  type: string
                  maxLength: 255
                  example: "Permohonan Sponsor Acara"
                pengirim_penerima:
                  type: string
                  maxLength: 255
                  description: "Pengirim (untuk Surat Masuk) atau Penerima (untuk Surat Keluar)"
                  example: "PT. Mitra Sukses"
                tanggal:
                  type: string
                  format: date
                  example: "2026-06-01"
                description:
                  type: string
                  maxLength: 10000
                file:
                  type: string
                  format: binary
                  description: "File surat (PDF/DOC/JPG/PNG, max 2MB)"
      responses:
        "201":
          description: Surat berhasil ditambahkan
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/Surat"
        "422":
          description: Validasi gagal
        "401":
          description: Tidak terautentikasi

  /surats/{id}:
    get:
      tags: [Surat]
      summary: Detail surat
      description: Mengembalikan detail surat berdasarkan ID.
      operationId: getSurat
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Detail surat
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/Surat"
        "404":
          description: Surat tidak ditemukan
        "401":
          description: Tidak terautentikasi

    put:
      tags: [Surat]
      summary: Update surat
      description: Memperbarui data surat. File lama akan dihapus jika diganti.
      operationId: updateSurat
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - nomor_surat
                - type
                - perihal
                - pengirim_penerima
                - tanggal
              properties:
                nomor_surat:
                  type: string
                  maxLength: 255
                type:
                  type: string
                  enum: [Surat Masuk, Surat Keluar]
                perihal:
                  type: string
                  maxLength: 255
                pengirim_penerima:
                  type: string
                  maxLength: 255
                tanggal:
                  type: string
                  format: date
                description:
                  type: string
                  maxLength: 10000
                file:
                  type: string
                  format: binary
                  description: "File baru (akan mengganti file lama)"
      responses:
        "200":
          description: Surat berhasil diperbarui
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/Surat"
        "422":
          description: Validasi gagal
        "404":
          description: Surat tidak ditemukan
        "401":
          description: Tidak terautentikasi

    delete:
      tags: [Surat]
      summary: Hapus surat
      description: Menghapus surat beserta file terkait dari storage.
      operationId: deleteSurat
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Surat berhasil dihapus
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        type: "null"
        "404":
          description: Surat tidak ditemukan
        "401":
          description: Tidak terautentikasi

